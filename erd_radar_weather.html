<div id="erd" style="padding:4px 0; background:#000; border-radius:12px;"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

await document.fonts.ready;

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: true,

    background: '#000000',

    primaryColor: '#111111',
    primaryBorderColor: '#666666',
    primaryTextColor: '#ffffff',

    secondaryColor: '#1a1a1a',
    tertiaryColor: '#222222',

    lineColor: '#888888',
    textColor: '#ffffff',

    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
  },
});

const diagram = `erDiagram
  RADAR_IMAGES {
    int id PK
    string location
    string filename
    string file_path
    datetime image_timestamp
    string source_type
    int datotif_id
    geometry extent
    int width_px
    int height_px
    float max_dbz
    int storm_pixel_count
    datetime created_at
  }

  GEO_TEMPLATE {
    int id PK
    string name
    string tif_path
    int width_px
    int height_px
    geometry bounds
  }

  IMAGE_SOURCE {
    string type
    string path_or_url
    string pattern
  }

  DACC_SESSION {
    datetime started_at
    datetime last_download_at
    int total_processed
    int total_skipped
    int total_discarded
    string location
  }

  RADAR_IMAGES ||--|| GEO_TEMPLATE : "geolocaliza con datotif_id"
  IMAGE_SOURCE ||--o{ RADAR_IMAGES : "origina"
  DACC_SESSION ||--o{ RADAR_IMAGES : "procesa"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelector('#erd svg').style.background = '#000';

document.querySelectorAll('#erd svg text').forEach(t => {
  t.setAttribute('fill', '#fff');
});

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;

  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);

  if (!nums || nums.length < 8) return;

  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];

  const x = Math.min(...xs);
  const y = Math.min(...ys);
  const w = Math.max(...xs) - x;
  const h = Math.max(...ys) - y;

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');

  rect.setAttribute('x', x);
  rect.setAttribute('y', y);
  rect.setAttribute('width', w);
  rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');

  rect.setAttribute('fill', '#111');
  rect.setAttribute('stroke', '#777');
  rect.setAttribute('stroke-width', '1.5');

  firstPath.replaceWith(rect);
});

document.querySelectorAll(
  '#erd svg .row-rect-odd path, #erd svg .row-rect-even path'
).forEach(p => {
  p.setAttribute('fill', '#1a1a1a');
  p.setAttribute('stroke', 'none');
});

document.querySelectorAll('#erd svg path').forEach(p => {
  if (!p.closest('.node')) {
    p.setAttribute('stroke', '#999');
  }
});
</script>
