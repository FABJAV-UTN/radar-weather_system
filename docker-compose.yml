services:
  db:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar_pass}
      POSTGRES_DB: ${POSTGRES_DB:-radar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://radar_user:radar_pass@db:5432/radar_db}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro

volumes:
  postgres_data: