services:
  db:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar_pass}
      POSTGRES_DB: ${POSTGRES_DB:-radar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://radar_user:radar_pass@db:5432/radar_db"
      LOG_LEVEL: debug
      RADAR_GIF_SOURCE_PATH: /radar_data
      RADAR_GIF_PATTERN: "*.png"
      IMAGE_SOURCE_TYPE: ${IMAGE_SOURCE_TYPE:-local}
      GEOTIFF_STORAGE_PATH: ${GEOTIFF_STORAGE_PATH:-./data/geotiffs}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
      - ./app/data/geo_templates:/app/data/geo_templates:ro
      - ./app/data/geotiffs:/app/data/geotiffs
      - /home/fabio/Descargas/compartir-Fabio-20260505T041231Z-3-001/compartir-Fabio:/radar_data:ro

volumes:
  postgres_data: